name: Self-Hosted Windows CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on:
      - self-hosted
      - windows
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source
        run: npm run build

      - name: Validate Docker config when Docker is available
        run: |
          if (-not (Get-Command docker -ErrorAction SilentlyContinue)) {
            Write-Host "Docker is not installed on this runner. Skipping Docker validation."
            exit 0
          }

          docker version
          docker compose version | Out-Null

          if ($LASTEXITCODE -eq 0) {
            docker compose -f compose.yaml config
          } else {
            Write-Host "Docker Compose plugin is not available. Skipping compose validation."
          }

          docker build --file Dockerfile --tag telegram-video-downloader-bot:ci .
